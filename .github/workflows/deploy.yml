name: Auto Deploy to Vercel

on:
  push:
    paths:
      - 'src/Data.tsx' # यहाँ उस फाइल का पाथ डालें जो आपका डेटा होल्ड करती है

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_MEdrQTmkHm2JT39uplwk4aw6gCHg/8wdPYBljM9"
